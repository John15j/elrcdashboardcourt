<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC26 Match Intel — Find a Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/home.css">
</head>
<body data-page="home">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">WC26</span>
      <span class="brand-sub">Match Intel</span>
    </div>
    <p class="tagline">Find a match. Open it. See everything.</p>
  </header>

  <!-- Live ticker strip: only populated by JS when live matches exist -->
  <div id="liveTicker" class="live-ticker" hidden>
    <span class="ticker-label"><span class="pulse-dot"></span>LIVE</span>
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <main class="page">

    <section class="finder-bar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search team, group, or stage…" autocomplete="off">
      </div>
      <div class="filter-pills" id="filterPills">
        <button class="pill active" data-filter="all">All</button>
        <button class="pill" data-filter="live">Live</button>
        <button class="pill" data-filter="upcoming">Upcoming</button>
        <button class="pill" data-filter="recent">Recent</button>
      </div>
    </section>

    <section class="match-section" id="liveSection">
      <div class="section-head">
        <h2><span class="pulse-dot small"></span>Live Matches</h2>
        <span class="section-count" id="liveCount">0</span>
      </div>
      <div class="match-grid" id="liveGrid"></div>
    </section>

    <section class="match-section" id="upcomingSection">
      <div class="section-head">
        <h2>Upcoming Matches</h2>
        <span class="section-count" id="upcomingCount">0</span>
      </div>
      <div class="match-grid" id="upcomingGrid"></div>
    </section>

    <section class="match-section" id="recentSection">
      <div class="section-head">
        <h2>🗂 Recent Matches</h2>
        <span class="section-count" id="recentCount">0</span>
      </div>
      <div class="match-grid" id="recentGrid"></div>
    </section>

    <p class="empty-state" id="emptyState" hidden>No matches found. Try a different team, group, or stage.</p>

  </main>

  <footer class="site-footer">
    <span>FIFA World Cup Match Intelligence — Version 1</span>
    <span class="footer-dim">Personal research project · sample data, not an official source</span>
  </footer>

  <script src="js/home.js"></script>
</body>
</html>
